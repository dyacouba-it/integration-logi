# =============================================================================
# Provisioning automatique de la datasource PostgreSQL (démo TP)
#
# Ce fichier est lu au démarrage de Grafana.
# Les variables ${...} sont résolues depuis les variables d'environnement
# passées au conteneur Grafana dans docker-compose.yml.
#
# RÔLE DE CETTE DATASOURCE :
# PostgreSQL est maintenu dans la stack pour satisfaire l'exigence TP.
# Les données GLPI sont dans MariaDB → voir mysql.yml (datasource principale).
# Cette datasource permet d'explorer PostgreSQL directement depuis Grafana
# à titre de démonstration (exploration, requêtes libres).
# =============================================================================

apiVersion: 1

datasources:
  - name: GLPI-PostgreSQL
    type: postgres
    # uid EXPLICITE — évite la génération d'UID aléatoire à chaque redémarrage
    uid: "GLPI-PostgreSQL"
    url: postgres:5432
    database: ${POSTGRES_DB}
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      # Version PostgreSQL 15 = 1500 (format requis par le plugin Grafana)
      postgresVersion: 1500
      timescaledb: false
    # Pas la datasource par défaut — MySQL/MariaDB (GLPI) l'est
    isDefault: false
    editable: false
