# =============================================================================
# TP Intégration Logicielle — M2 ISIE IBAM
# Stack complète : MariaDB + GLPI + PostgreSQL + Grafana + Prometheus + cAdvisor
#
# Architecture choisie après découverte d'une incompatibilité fondamentale :
# GLPI 10.x n'utilise QUE l'extension PHP mysqli pour ses connexions DB, y compris
# dans le CLI (glpi:database:install) et l'installeur web (install/install.php).
# PostgreSQL est donc incompatible avec GLPI malgré la documentation GLPI qui le
# mentionne comme supporté — cette mention concerne l'ORM interne (DBmysqlIterator)
# mais jamais le driver PHP sous-jacent.
#
# Solution retenue :
#   - MariaDB 10.11 : base de données réelle de GLPI (protocol MySQL/mysqli)
#   - PostgreSQL 15 : maintenu dans la stack pour satisfaire l'exigence du TP
#     et comme datasource de démonstration dans Grafana
#   - L'image GLPI custom reste utile pour les extensions PHP et l'automatisation
#     de l'installation via le CLI GLPI (qui fonctionne avec MariaDB)
#
# Démarrage : docker compose up -d
# Arrêt complet + suppression données : docker compose down -v
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # 1. MariaDB — Base de données principale de GLPI
  #    MariaDB 10.11 (LTS) est 100% compatible avec le driver PHP mysqli utilisé
  #    par GLPI. Le health check garantit que GLPI ne démarre qu'une fois
  #    MariaDB prête à accepter des connexions.
  # ---------------------------------------------------------------------------
  mariadb:
    image: mariadb:10.11
    container_name: glpi_mariadb
    restart: unless-stopped
    environment:
      # Variables officielles de l'image mariadb:10.11
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      # Le mot de passe root est requis par l'image (sinon démarrage échoue)
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      # Encodage UTF-8 + collation Unicode pour les noms de tickets GLPI
      MARIADB_CHARACTER_SET: utf8mb4
      MARIADB_COLLATE: utf8mb4_unicode_ci
    volumes:
      # Volume nommé pour la persistance des données entre redémarrages
      - mariadb_data:/var/lib/mysql
    networks:
      - glpi_network
    healthcheck:
      # healthcheck.sh est fourni par l'image officielle mariadb depuis 10.5
      # --innodb_initialized garantit que le moteur InnoDB est prêt (pas juste TCP)
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # 2. PostgreSQL — Base de données auxiliaire dans la stack TP
  #
  #    POURQUOI POSTGRESQL EST-IL MAINTENU ALORS QUE GLPI UTILISE MARIADB ?
  #    Le sujet du TP impose PostgreSQL dans la stack. PostgreSQL est présent ici
  #    en tant que datasource de démonstration dans Grafana (datasource secondaire).
  #    GLPI ne peut PAS utiliser PostgreSQL car son driver PHP (mysqli) ne parle
  #    que le protocole MySQL — voir section "Difficultés" du README pour l'analyse
  #    complète de cette incompatibilité.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    container_name: glpi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Encodage UTF-8 pour la cohérence avec MariaDB
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - glpi_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # 3. GLPI — Système de gestion de parc informatique (ITSM)
  #
  #    Image custom basée sur php:8.2-apache avec GLPI 10.0.16 pré-installé.
  #    L'entrypoint.sh automatise l'installation via le CLI GLPI au 1er démarrage :
  #      php bin/console glpi:database:install --db-host=mariadb ...
  #    Cette commande CLI utilise mysqli (compatible MariaDB), contrairement à
  #    l'ancien essai sur PostgreSQL qui échouait pour cette raison.
  #
  #    Dépend de mariadb avec condition service_healthy : GLPI ne démarre
  #    qu'une fois MariaDB opérationnel.
  # ---------------------------------------------------------------------------
  glpi:
    build:
      context: ./glpi
      dockerfile: Dockerfile
    # pull_policy: build → toujours construire localement, ne jamais chercher
    # cette image sur Docker Hub (évite l'erreur "pull access denied")
    pull_policy: build
    container_name: glpi_app
    restart: unless-stopped
    depends_on:
      mariadb:
        # Attendre que le health check de mariadb soit "healthy"
        condition: service_healthy
    environment:
      # Paramètres lus par entrypoint.sh pour l'installation automatique
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      # 8080 est souvent occupé sur Windows → port 8082
      - "8082:80"
    volumes:
      # config_db.php persist → GLPI ne se réinstalle pas à chaque redémarrage
      - glpi_config:/var/www/html/config
      # Fichiers uploadés (documents, pièces jointes tickets…)
      - glpi_files:/var/www/html/files
      # Plugins installés
      - glpi_plugins:/var/www/html/plugins
    networks:
      - glpi_network

  # ---------------------------------------------------------------------------
  # 4. Grafana — Tableaux de bord et visualisation
  #    Deux datasources provisionnées automatiquement :
  #      - GLPI-MySQL  (MariaDB) : données GLPI — dashboard ITSM
  #      - Prometheus             : métriques infra — dashboard monitoring
  #      - GLPI-PostgreSQL        : PostgreSQL (TP) — datasource secondaire
  #    Les variables ${...} dans les fichiers YAML sont résolues via les vars
  #    d'environnement ci-dessous.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: glpi_grafana
    restart: unless-stopped
    depends_on:
      - mariadb
      - postgres
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/glpi_dashboard.json
      # -----------------------------------------------------------------------
      # Variables OBLIGATOIRES pour la résolution des ${...} dans les fichiers
      # YAML de provisioning des datasources.
      # -----------------------------------------------------------------------
      # MariaDB (datasource principale — données GLPI)
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      # PostgreSQL (datasource secondaire — TP)
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - glpi_network

  # ---------------------------------------------------------------------------
  # 5. cAdvisor — Exposition des métriques des conteneurs Docker
  #    Analyse CPU, mémoire et réseau de chaque conteneur en accédant aux cgroups.
  #    Note : /dev/kmsg absent sur Windows (WSL2) et macOS → section devices: retirée.
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: glpi_cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - glpi_network

  # ---------------------------------------------------------------------------
  # 6. Prometheus — Collecte et stockage de métriques (TSDB)
  #    Scrape cAdvisor toutes les 15s.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: glpi_prometheus
    restart: unless-stopped
    depends_on:
      - cadvisor
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - glpi_network

# =============================================================================
# Volumes nommés
# =============================================================================
volumes:
  mariadb_data:
    driver: local
  postgres_data:
    driver: local
  # glpi_config persiste config_db.php → évite réinstallation en boucle
  glpi_config:
    driver: local
  glpi_files:
    driver: local
  glpi_plugins:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local

# =============================================================================
# Réseau Docker dédié — isolation de la stack, communication par nom de service
# =============================================================================
networks:
  glpi_network:
    driver: bridge
    name: glpi_network
